name: Build and Publish Release APK

on:
  push:
    tags:
      - '*'

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Extract version from tag
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build release APK
        run: bash ./gradlew assembleRelease -PappVerName=${{ env.RELEASE_VERSION }}

      - name: Sign APK
        uses: ilharp/sign-android-release@13dd52242698526f951aa8bb8696204f6fea702a # v2.0.0
        id: sign_app
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Prepare release files
        run: |
          cp ${{ steps.sign_app.outputs.signedFile }} Chimera-${{ env.RELEASE_VERSION }}.apk

      - name: Generate release notes
        shell: bash
        run: |
          CURRENT_TAG="${RELEASE_VERSION}"
          PREV_TAG="$(git tag --sort=-v:refname | grep -Fxv "$CURRENT_TAG" | head -n 1)"
          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="$PREV_TAG...$CURRENT_TAG"
          fi
          bash .github/scripts/gen_release_notes.sh -r "$RANGE" -o release.md

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ contains(env.RELEASE_VERSION, '-') }}
          draft: false
          generate_release_notes: false
          body_path: release.md
          files: |
            Chimera-${{ env.RELEASE_VERSION }}.apk

